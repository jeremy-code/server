##############################################################################
#                   Authelia configuration                                   #
##############################################################################

theme: auto
default_2fa_method: "totp"

# Server Configuration
server:
  address: tcp://0.0.0.0:9091/

# Log Configuration
log:
  level: info
  format: json
  file_path: /config/logs/authelia.log
  keep_stdout: true

# TOTP Configuration
totp:
  disable: false
  issuer: '{{ env "SERVER_DOMAIN" }}'

# Identity Validation Configuration
identity_validation:
  reset_password:
    jwt_lifespan: "5 minutes"
    jwt_algorithm: "HS256"
    jwt_secret: '{{ secret "/run/secrets/jwt-secret" }}'

# NTP Configuration
ntp:
  address: "udp://169.254.169.254:123" # https://docs.oracle.com/en-us/iaas/Content/Compute/Tasks/configuringntpservice.htm

# Authentication Backend Provider Configuration
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: "bcrypt"
      bcrypt:
        variant: "standard"
        cost: "12"

# Access Control Configuration
access_control:
  default_policy: "two_factor"

# Session Provider Configuration
session:
  secret: '{{ secret "/run/secrets/session-secret" }}'
  cookies:
    - name: authelia
      domain: '{{ env "SERVER_DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "SERVER_DOMAIN" }}'
      same_site: lax
  redis:
    host: "redis"
    port: 6379
    username: "jeremy"
    password: '{{ secret "/run/secrets/authelia-redis-password" }}'

# Regulation Configuration
regulation:
  modes:
    - "ip"
  max_retries: 5
  find_time: 2 minutes
  ban_time: 10 minutes

# Storage Provider Configuration
storage:
  encryption_key: '{{ secret "/run/secrets/storage-encryption-key" }}'
  local:
    path: /config/db.sqlite3

# Notification Provider
notifier:
  disable_startup_check: true
  smtp:
    address: 'smtp://{{ env "SMTP_HOST" }}'
    username: '{{ env "SMTP_USERNAME" }}'
    password: '{{ env "SMTP_PASSWORD" }}'
    sender: 'Authelia <{{ env "SMTP_FROM" }}>'
    identifier: "localhost"
    subject: "[Authelia] {title}"

# Identity Providers
identity_providers:
  oidc:
    hmac_secret: '{{ secret "/run/secrets/hmac-secret" }}'
    jwks:
      - key_id: "main"
        algorithm: "RS256"
        use: "sig"
        key: |
          {{- fileContent "/run/secrets/authelia-oidc-signing-key" | nindent 10 }}
    clients:
      - client_id: '{{ env "GATUS_CLIENT_ID" }}'
        client_name: Gatus
        client_secret: '{{ env "GATUS_CLIENT_SECRET" }}'
        require_pkce: false
        redirect_uris:
          - 'https://status.{{ env "SERVER_DOMAIN" }}/authorization-code/callback'
        scopes:
          - "openid"
        response_types:
          - "code"
        grant_types:
          - "authorization_code"
        access_token_signed_response_alg: "none"
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_basic"
      - client_id: '{{ env "VAULTWARDEN_CLIENT_ID" }}'
        client_name: Vaultwarden
        client_secret: '{{ env "VAULTWARDEN_CLIENT_SECRET" }}'
        redirect_uris:
          - 'https://vault.{{ env "SERVER_DOMAIN" }}/identity/connect/oidc-signin'
        authorization_policy: "two_factor"
        require_pkce: true
        pkce_challenge_method: "S256"
        scopes:
          - "openid"
          - "offline_access"
          - "profile"
          - "email"
        response_types:
          - "code"
        grant_types:
          - "authorization_code"
          - "refresh_token"
        access_token_signed_response_alg: "none"
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_basic"
      - client_id: '{{ env "FRESHRSS_CLIENT_ID" }}'
        client_name: FreshRSS
        client_secret: '{{ env "FRESHRSS_CLIENT_SECRET" }}'
        require_pkce: true
        pkce_challenge_method: "S256"
        redirect_uris:
          - 'https://rss.{{ env "SERVER_DOMAIN" }}/i/oidc/'
        scopes:
          - "openid"
          - "email"
          - "profile"
          - "offline_access"
        response_types:
          - "code"
        grant_types:
          - "authorization_code"
          - "refresh_token"
        access_token_signed_response_alg: "none"
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_basic"
      - client_id: '{{ env "WG_EASY_CLIENT_ID" }}'
        client_name: wg-easy
        client_secret: '{{ env "WG_EASY_CLIENT_SECRET" }}'
        redirect_uris:
          - 'https://wireguard.{{ env "SERVER_DOMAIN" }}/api/auth/oidc/callback'
          - 'https://wireguard.{{ env "SERVER_DOMAIN" }}/api/auth/oidc/link'
        scopes:
          - openid
          - profile
          - email
        authorization_policy: one_factor
        pre_configured_consent_duration: 1 week
        require_pkce: true
        token_endpoint_auth_method: client_secret_post
